<!doctype html>
<html lang="en" data-theme="day">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazesWorld — The official home of Blaze</title>
    <meta
      name="description"
      content="BlazesWorld is the official home of Blaze the cat — the one and only Orange Monkey. A gallery of chaos, cuddles, and cat magic."
    />
    <meta property="og:title" content="BlazesWorld — The official home of Blaze" />
    <meta
      property="og:description"
      content="The one and only Orange Monkey. A gallery of chaos, cuddles, and cat magic."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#fff7ed" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set the theme before first paint to avoid a flash of the wrong mode.
      ;(function () {
        try {
          var stored = localStorage.getItem('blazesworld:theme')
          var theme =
            stored === 'day' || stored === 'night'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'night'
                : 'day'
          document.documentElement.dataset.theme = theme
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'night' ? '#161427' : '#fff7ed')
        } catch (e) {
          /* default theme stays */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
